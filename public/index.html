<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Animeku - Nonton Streaming Anime Sub Indo Gratis</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;500;700;900&display=swap" rel="stylesheet">
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-database-compat.js"></script>

    <style>
        body, html { margin: 0; padding: 0; background: #050505; color: #fff; font-family: 'Outfit', sans-serif; overflow-x: hidden; }
        .hide-scrollbar::-webkit-scrollbar { display: none; }
        .hide-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        .hidden { display: none !important; }
        
        .navbar { position: sticky; top: 0; z-index: 1000; background: #050505; padding: 12px 15px; display: flex; align-items: center; gap: 12px; }
        .app-logo { font-weight: 900; font-size: 18px; }
        .app-logo .blue { color: #3b82f6; }
        .top-search-bar { flex: 1; background: #1a1a1a; padding: 8px 15px; border-radius: 20px; display: flex; align-items: center; }
        .top-search-bar input { background: transparent; border: none; color: #fff; width: 100%; outline: none; margin-left: 8px; font-family: 'Outfit', sans-serif; }

        #loading { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #050505; z-index: 99999; display: flex; justify-content: center; align-items: center; }
        .spinner { width: 45px; height: 45px; border: 4px solid #1a1a1a; border-left-color: #3b82f6; border-radius: 50%; animation: spin 1s linear infinite; }
        @keyframes spin { 100% { transform: rotate(360deg); } }

        /* ==== CSS TIMELINE FULL WIDTH ==== */
        #recent-view { padding-left: 0 !important; padding-right: 0 !important; }
        .timeline-wrapper { padding: 0; margin: 0; position: relative; width: 100%; box-sizing: border-box; }
        .timeline-group { position: relative; margin-bottom: 25px; width: 100%; }
        .timeline-group::before { content: ''; position: absolute; left: 20px; top: 35px; bottom: -35px; width: 2px; background: #333; z-index: 0; }
        .timeline-group:last-child::before { display: none; }
        .timeline-date-badge { background: #1c3d73; color: #fff; font-size: 14px; font-weight: 800; padding: 6px 18px 6px 20px; border-radius: 0 20px 20px 0; display: inline-block; position: relative; z-index: 1; margin-bottom: 15px; }
        .timeline-items { padding-left: 45px; padding-right: 15px; display: flex; flex-direction: column; gap: 15px; width: 100%; box-sizing: border-box; }
        .timeline-card { background: #1c1c1e; border-radius: 12px; display: flex; gap: 12px; padding: 12px; border: 1px solid #2c2c2e; width: 100%; box-sizing: border-box; cursor:pointer;}
        .timeline-img { width: 75px; height: 100px; border-radius: 8px; overflow: hidden; position: relative; flex-shrink: 0; }
        .timeline-img img { width: 100%; height: 100%; object-fit: cover; }
        .timeline-play-icon { position: absolute; bottom: 6px; right: 6px; background: #3b82f6; width: 22px; height: 22px; border-radius: 50%; display: flex; align-items: center; justify-content: center; color: white; font-size: 10px;}
        .timeline-info { flex: 1; display: flex; flex-direction: column; justify-content: space-between; min-width: 0; }
        .timeline-header { display: flex; justify-content: space-between; align-items: flex-start; gap: 10px; }
        .timeline-title { font-size: 15px; font-weight: 800; line-height: 1.3; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
        .timeline-time { font-size: 12px; color: #a1a1aa; font-weight: 700; flex-shrink: 0; }
        .timeline-ep { font-size: 13px; color: #d1d5db; margin-top: 4px; }
        .timeline-progress-bg { height: 4px; background: #333; border-radius: 2px; overflow: hidden; margin-bottom: 6px; }
        .timeline-progress-fill { height: 100%; background: #ef4444; }
        .timeline-progress-text { font-size: 11px; color: #a1a1aa; text-align: right; }

        /* ==== CSS BADGE & ANIMASI (GLOBAL) ==== */
        .c-badge { padding: 3px 8px; border-radius: 6px; font-size: 10px; font-weight: 800; display: inline-flex; align-items: center; letter-spacing: 0.2px; }
        .badge-lvl-normal { background: rgba(250, 204, 21, 0.15); color: #facc15; border: 1px solid rgba(250, 204, 21, 0.3); }
        .badge-lvl-silver { background: rgba(226, 232, 240, 0.15); color: #e2e8f0; border: 1px solid rgba(226, 232, 240, 0.3); }
        .badge-lvl-gold { background: rgba(251, 191, 36, 0.25); color: #fbbf24; border: 1px solid rgba(251, 191, 36, 0.6); box-shadow: 0 0 6px rgba(251, 191, 36, 0.4); }
        .badge-member { background: rgba(59, 130, 246, 0.15); color: #60a5fa; border: 1px solid rgba(59, 130, 246, 0.3); }

        /* Animasi Biru (Premium) */
        .badge-premium-anim {
            background: linear-gradient(90deg, #2563eb, #06b6d4, #2563eb); background-size: 200% 100%; color: #fff; border: none;
            animation: shimmerPremium 2.5s infinite linear; box-shadow: 0 0 8px rgba(59, 130, 246, 0.5);
        }
        /* Animasi Merah (Dev) */
        .badge-dev-anim {
            background: linear-gradient(90deg, #dc2626, #7f1d1d, #dc2626); background-size: 200% 100%; color: #fff; border: 1px solid #fca5a5;
            animation: devPulse 2s infinite ease-in-out, shimmerPremium 3s infinite linear;
            box-shadow: 0 0 10px rgba(220, 38, 38, 0.8); text-shadow: 0 0 4px rgba(255,255,255,0.5);
        }

        @keyframes shimmerPremium { 0% { background-position: 100% 0; } 100% { background-position: -100% 0; } }
        @keyframes devPulse { 0%, 100% { transform: scale(1); box-shadow: 0 0 8px rgba(220, 38, 38, 0.6); } 50% { transform: scale(1.05); box-shadow: 0 0 16px rgba(239, 68, 68, 1); } }

        .comment-filter-btn { background: transparent; border: 1px solid #333; color: #aaa; padding: 6px 16px; border-radius: 20px; font-size: 12px; font-weight: 700; cursor: pointer; transition: 0.2s; }
        .comment-filter-btn.active { background: #fff; color: #000; border-color: #fff; }

        /* ==== MODAL / BOTTOM SHEET CSS ==== */
        .modal-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.7); z-index: 99998; backdrop-filter: blur(2px); display: none; }
        .bottom-sheet { position: fixed; bottom: 0; left: 0; width: 100%; background: #1c1c1e; z-index: 99999; border-radius: 24px 24px 0 0; padding: 25px 20px; box-sizing: border-box; transform: translateY(100%); transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1); display: none; }
        .bottom-sheet.show { transform: translateY(0); }

        /* General Layout helpers */
        .header-flex { display: flex; justify-content: space-between; align-items: center; padding: 15px 10px; }
        .horizontal-scroll { display: flex; gap: 10px; overflow-x: auto; padding: 0 10px; scroll-snap-type: x mandatory; }
        .scroll-card { background: transparent; width: 115px; flex-shrink: 0; scroll-snap-align: start; cursor: pointer; }
        .scroll-card-img { position: relative; width: 100%; padding-top: 140%; border-radius: 6px; overflow: hidden; background: #1a1a1a; }
        .scroll-card-img img { position: absolute; top: 0; left: 0; width: 100%; height: 100%; object-fit: cover; }
        .badge-ep { position: absolute; top: 5px; left: 5px; background: #3b82f6; font-size: 10px; font-weight: bold; padding: 3px 5px; border-radius: 4px; z-index: 2; }
        .badge-score { position: absolute; top: 5px; right: 5px; background: rgba(0,0,0,0.75); color: #fbbf24; font-size: 10px; font-weight: bold; padding: 3px 4px; border-radius: 4px; z-index: 2; }
        .scroll-card-title { font-size: 13px; margin-top: 8px; line-height: 1.4; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }

        .recent-card { width: 140px; flex-shrink: 0; scroll-snap-align: start; cursor: pointer; }
        .recent-img-box { position: relative; width: 100%; padding-top: 56.25%; border-radius: 8px; overflow: hidden; background: #1a1a1a; }
        .recent-img-box img { position: absolute; top: 0; left: 0; width: 100%; height: 100%; object-fit: cover; }
        .recent-overlay { position: absolute; bottom: 0; width: 100%; height: 35px; background: linear-gradient(to top, rgba(0,0,0,0.9), transparent); z-index: 1; }
        .recent-ep-text { position: absolute; bottom: 6px; left: 8px; font-size: 11px; font-weight: 800; z-index: 2; }
        .recent-title { font-size: 12px; margin-top: 6px; line-height: 1.3; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }

        .detail-hero { position: relative; width: 100%; height: 380px; background-size: cover; background-position: center top; display: flex; align-items: flex-end; }
        .detail-hero-overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: linear-gradient(to top, #050505 0%, rgba(5,5,5,0.8) 40%, transparent 100%); }
        .detail-hero-content { position: relative; z-index: 2; padding: 20px; width: 100%; }
        .nav-back { position: absolute; top: 15px; left: 15px; z-index: 10; }
        .nav-back button { background: rgba(0,0,0,0.4); backdrop-filter: blur(5px); border: none; color: #fff; padding: 8px 12px; border-radius: 20px; font-size: 13px; cursor: pointer; }

        .video-container-fixed { width: 100%; background: #000; position: relative; }
        .video-container-fixed iframe { width: 100%; height: 240px; border: none; display: block; }
        .watch-back-btn { position: absolute; top: 15px; left: 15px; z-index: 10; background: rgba(0,0,0,0.5); border: none; color: #fff; padding: 6px; border-radius: 50%; cursor: pointer; }
        
        .bottom-nav { position: fixed; bottom: 0; width: 100%; background: #050505; display: flex; border-top: 1px solid #111; z-index: 1000; }
        .nav-item { flex: 1; padding: 12px 0; display: flex; flex-direction: column; align-items: center; color: #555; cursor: pointer; font-size: 11px; }
        .nav-item.active { color: #3b82f6; }
        
        #xp-toast { position: fixed; top: 20px; left: 50%; transform: translateX(-50%); background: #3b82f6; color: white; padding: 12px 24px; border-radius: 24px; font-weight: 800; font-size: 14px; z-index: 999999; display: none; align-items: center; gap: 8px; }

        /* Akun / Profile Specifics */
        .profile-header { text-align: center; padding: 10px 0 20px 0; }
        .profile-avatar { width: 100px; height: 100px; border-radius: 50%; border: 3px solid #1a1a1a; object-fit: cover; }
        .profile-name { font-size: 22px; font-weight: 800; margin: 12px 0 10px 0; }
        .profile-stats { display: flex; justify-content: space-around; padding: 0 10px 25px 10px; border-bottom: 1px solid #1a1a1a; }
        .stat-val { font-size: 20px; font-weight: 800; } .stat-lbl { font-size: 11px; color: #a1a1aa; }
        .profile-tabs { display: flex; justify-content: space-around; border-bottom: 1px solid #1a1a1a; margin-bottom: 20px; }
        .ptab { padding: 12px 20px; color: #a1a1aa; font-weight: 800; cursor: pointer; position: relative; }
        .ptab.active { color: #fff; } .ptab.active::after { content:''; position:absolute; bottom:-1px; left:20%; width:60%; height:3px; background:#fff; }
        .profile-list-item { display: flex; gap: 15px; margin-bottom: 20px; padding: 0 15px; cursor: pointer; }
        .pli-img { width: 65px; height: 65px; border-radius: 10px; object-fit: cover; }
        .pli-info { flex: 1; } .pli-title { font-size: 14px; font-weight: 800; margin-bottom: 4px; display: -webkit-box; -webkit-line-clamp: 1; -webkit-box-orient: vertical; overflow: hidden; }
        .pli-ep { font-size: 12px; color: #a1a1aa; margin-bottom: 8px; }
        .pli-progress-bg { height: 4px; background: #333; border-radius: 2px; } .pli-progress-fill { height: 100%; background: #ef4444; }
    </style>
</head>
<body>

    <div id="xp-toast">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 2l3.09 6.26L22 9.27l-5 4.87 1.18 6.88L12 17.77l-6.18 3.25L7 14.14 2 9.27l6.91-1.01L12 2z"/></svg> 
        <span id="xp-toast-text">+50 XP!</span>
    </div>

    <div id="serverModalOverlay" class="modal-overlay" onclick="closeServerModal()"></div>
    <div id="serverModal" class="bottom-sheet">
        <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px;">
            <div style="font-weight: 800; font-size: 18px;">Pilih Quality Server</div>
            <button onclick="closeServerModal()" style="background: transparent; border: none; color: #aaa; cursor: pointer;"><svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line></svg></button>
        </div>
        <div id="modal-server-list" style="display: flex; flex-direction: column;" class="hide-scrollbar"></div>
    </div>

    <div id="replyModalOverlay" class="modal-overlay" onclick="closeReplyModal()"></div>
    <div id="replyModal" class="bottom-sheet">
        <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; padding-bottom: 15px; border-bottom: 1px solid #333;">
            <div style="font-weight: 800; font-size: 18px;">Replies</div>
            <button onclick="closeReplyModal()" style="background: transparent; border: none; color: #aaa; cursor: pointer;"><svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line></svg></button>
        </div>
        <div id="reply-parent-content" style="margin-bottom: 10px;"></div>
        <div id="reply-list-container" class="hide-scrollbar" style="max-height: 40vh; overflow-y: auto; margin-bottom: 15px; padding-left: 20px; border-left: 2px solid #333; margin-left: 18px;"></div>
        <div id="reply-input-area"></div>
    </div>

    <nav class="navbar" id="mainNavbar">
        <div class="app-logo"><span class="blue">Anime</span><span class="white">ku</span></div>
        <div class="top-search-bar">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#888" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"></circle><line x1="21" y1="21" x2="16.65" y2="16.65"></line></svg>
            <input type="text" id="searchInput" placeholder="Cari Anime..." onkeypress="if(event.key === 'Enter') handleSearch(this.value)">
        </div>
    </nav>

    <main id="app" style="padding-bottom: 80px;">
        <div id="loading" class="hidden"><div class="spinner"></div></div>
        
        <div id="home-view"></div>
        <div id="search-view" class="hidden"></div>
        <div id="recent-view" class="hidden"><div id="recent-results-container"></div></div>
        <div id="favorite-view" class="hidden"><div id="favorite-results-container"></div></div>
        <div id="developer-view" class="hidden"><div id="auth-check-container"></div></div>
        <div id="detail-view" class="hidden"></div>
        <div id="watch-view" class="hidden"></div>
    </main>

    <nav class="bottom-nav" id="bottomNav">
        <div class="nav-item active" onclick="switchTab('home')" id="tab-home">
            <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"></path><polyline points="9 22 9 12 15 12 15 22"></polyline></svg><span>Home</span>
        </div>
        <div class="nav-item" onclick="switchTab('recent')" id="tab-recent">
            <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"></circle><polyline points="12 6 12 12 16 14"></polyline></svg><span>Recent</span>
        </div>
        <div class="nav-item" onclick="switchTab('favorite')" id="tab-favorite">
            <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"></path><path d="M13.73 21a2 2 0 0 1-3.46 0"></path></svg><span>Subscribe</span>
        </div>
        <div class="nav-item" onclick="switchTab('developer')" id="tab-developer">
            <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path><circle cx="12" cy="7" r="4"></circle></svg><span>Akun</span>
        </div>
    </nav>

    <script src="app.js"></script>
</body>
</html>
