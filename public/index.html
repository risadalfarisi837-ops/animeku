<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Animeku - Nonton Anime Sub Indo</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;500;700;900&display=swap" rel="stylesheet">
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-database-compat.js"></script>

    <style>
        body, html { margin: 0; padding: 0; background: #050505; color: #fff; font-family: 'Outfit', sans-serif; overflow-x: hidden; }
        .hidden { display: none !important; }
        .navbar { position: sticky; top: 0; z-index: 1000; background: #050505; padding: 12px 15px; display: flex; align-items: center; gap: 12px; }
        .app-logo { font-weight: 900; font-size: 18px; }
        .top-search-bar { flex: 1; background: #1a1a1a; padding: 8px 15px; border-radius: 20px; display: flex; align-items: center; }
        .top-search-bar input { background: transparent; border: none; color: #fff; width: 100%; outline: none; margin-left: 8px; }
        
        #loading { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #050505; z-index: 9999; display: flex; justify-content: center; align-items: center; }
        .spinner { width: 40px; height: 40px; border: 4px solid #111; border-left-color: #3b82f6; border-radius: 50%; animation: spin 1s linear infinite; }
        @keyframes spin { 100% { transform: rotate(360deg); } }

        /* TIMELINE CSS - FULL WIDTH */
        #recent-view { padding-left: 0 !important; padding-right: 0 !important; }
        .timeline-wrapper { position: relative; width: 100%; }
        .timeline-group { position: relative; margin-bottom: 25px; }
        .timeline-group::before { content: ''; position: absolute; left: 20px; top: 35px; bottom: -35px; width: 2px; background: #222; }
        .timeline-date-badge { background: #1c3d73; color: #fff; font-size: 13px; font-weight: 800; padding: 6px 20px; border-radius: 0 20px 20px 0; margin-bottom: 15px; display: inline-block; position: relative; z-index: 1; }
        .timeline-items { padding-left: 45px; padding-right: 15px; display: flex; flex-direction: column; gap: 15px; }
        .timeline-card { background: #111; border-radius: 12px; display: flex; gap: 12px; padding: 12px; border: 1px solid #1a1a1a; width: 100%; box-sizing: border-box; }
        .timeline-img { width: 70px; height: 95px; border-radius: 8px; overflow: hidden; position: relative; flex-shrink: 0; }
        .timeline-img img { width: 100%; height: 100%; object-fit: cover; }
        .timeline-play-icon { position: absolute; bottom: 5px; right: 5px; background: #3b82f6; width: 20px; height: 20px; border-radius: 50%; font-size: 10px; display: flex; align-items: center; justify-content: center; }
        .timeline-info { flex: 1; display: flex; flex-direction: column; justify-content: space-between; min-width: 0; }
        .timeline-title { font-size: 14px; font-weight: 800; overflow: hidden; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; }
        .timeline-progress-bg { height: 3px; background: #222; border-radius: 2px; margin: 8px 0 4px 0; }
        .timeline-progress-fill { height: 100%; background: #ef4444; }
        .timeline-progress-text { font-size: 10px; color: #666; text-align: right; }

        /* KOMENTAR & ANIMASI */
        .c-badge { padding: 3px 8px; border-radius: 4px; font-size: 10px; font-weight: 800; display: inline-flex; }
        .badge-lvl-gold { background: rgba(251, 191, 36, 0.2); color: #fbbf24; border: 1px solid #fbbf24; }
        .badge-premium-anim { 
            background: linear-gradient(90deg, #2563eb, #06b6d4, #2563eb); background-size: 200%; 
            color: #fff; animation: shim 2s infinite linear; 
        }
        .badge-dev-anim { 
            background: #dc2626; color: #fff; animation: pulse 1.5s infinite ease-in-out; 
            box-shadow: 0 0 10px rgba(220, 38, 38, 0.5); font-weight: 900;
        }
        @keyframes shim { 0% { background-position: 100%; } 100% { background-position: -100%; } }
        @keyframes pulse { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.1); box-shadow: 0 0 15px #f00; } }

        /* Lainnya */
        .horizontal-scroll { display: flex; gap: 12px; overflow-x: auto; padding: 0 15px; }
        .recent-card { width: 140px; flex-shrink: 0; }
        .recent-img-box { position: relative; width: 100%; padding-top: 56%; border-radius: 8px; overflow: hidden; }
        .recent-img-box img { position: absolute; top:0; left:0; width:100%; height:100%; object-fit:cover; }
        .bottom-nav { position: fixed; bottom: 0; width: 100%; background: #050505; display: flex; border-top: 1px solid #111; z-index: 1000; }
        .nav-item { flex: 1; padding: 12px 0; text-align: center; color: #555; font-size: 11px; cursor: pointer; }
        .nav-item.active { color: #3b82f6; font-weight: 800; }
    </style>
</head>
<body>
    <div id="loading" class="hidden"><div class="spinner"></div></div>
    <div id="xp-toast" style="position:fixed; top:20px; left:50%; transform:translateX(-50%); background:#3b82f6; padding:10px 20px; border-radius:20px; display:none; z-index:10001; font-weight:800;"><span id="xp-toast-text"></span></div>

    <nav class="navbar" id="mainNavbar">
        <div class="app-logo"><span style="color:#3b82f6">Anime</span>ku</div>
        <div class="top-search-bar">
            <input type="text" placeholder="Cari anime..." onkeypress="if(event.key==='Enter') handleSearch(this.value)">
        </div>
    </nav>

    <main id="app">
        <div id="home-view"></div>
        <div id="search-view" class="hidden"></div>
        <div id="recent-view" class="hidden">
            <div class="view-header-title"></div>
            <div id="recent-results-container"></div>
        </div>
        <div id="developer-view" class="hidden"><div id="auth-check-container"></div></div>
        <div id="detail-view" class="hidden"></div>
        <div id="watch-view" class="hidden"></div>
    </main>

    <nav class="bottom-nav" id="bottomNav">
        <div class="nav-item active" onclick="switchTab('home')" id="tab-home">Home</div>
        <div class="nav-item" onclick="switchTab('recent')" id="tab-recent">Recent</div>
        <div class="nav-item" onclick="switchTab('developer')" id="tab-developer">Akun</div>
    </nav>

    <script src="app.js"></script>
</body>
</html>
