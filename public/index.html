<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#0f0f0f">
    <link rel="apple-touch-icon" href="https://placehold.co/192x192/1a1a1a/3b82f6?text=App">
    
    <title>Animeku - Nonton Streaming Anime Sub Indo Gratis</title>
    <meta name="description" content="Animeku tempat nonton streaming dan download anime subtitle Indonesia terlengkap.">

    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-database-compat.js"></script>

    <style>
        /* ================= BASE & TYPOGRAPHY ================= */
        body, html { margin: 0; padding: 0; background: #0f0f0f; color: #fff; font-family: 'Plus Jakarta Sans', sans-serif; -webkit-tap-highlight-color: transparent; }
        .hide-scrollbar::-webkit-scrollbar { display: none; }
        .hide-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        a { text-decoration: none; color: inherit; }

        /* ================= NAVBAR & SEARCH ================= */
        .navbar { position: sticky; top: 0; z-index: 1000; background: rgba(15, 15, 15, 0.95); backdrop-filter: blur(10px); padding: 12px 15px; display: flex; align-items: center; gap: 12px; }
        .app-logo { display: flex; align-items: center; font-weight: 800; font-size: 20px; letter-spacing: -0.5px; }
        .app-logo .blue { color: #3b82f6; }
        
        .top-search-bar { flex: 1; display: flex; align-items: center; background: #222; padding: 10px 15px; border-radius: 24px; border: 1px solid #333; }
        .top-search-bar input { background: transparent; border: none; color: #fff; width: 100%; margin-left: 8px; outline: none; font-size: 14px; font-family: inherit; }
        
        /* ================= LOADING SPINNER ================= */
        #loading { position: fixed; inset: 0; background: rgba(15, 15, 15, 0.9); backdrop-filter: blur(5px); z-index: 99999; display: flex; flex-direction: column; align-items: center; justify-content: center; transition: opacity 0.3s; }
        #loading.hidden { display: none !important; }
        .spinner { width: 40px; height: 40px; border: 4px solid rgba(255, 255, 255, 0.1); border-left-color: #3b82f6; border-radius: 50%; animation: spin 1s linear infinite; margin-bottom: 15px; }
        @keyframes spin { 100% { transform: rotate(360deg); } }

        /* ================= PREMIUM BANNER ================= */
        .premium-banner { background: #1a1a1a; margin: 15px; padding: 12px 15px; border-radius: 12px; border: 1px solid #333; display: flex; align-items: center; gap: 12px; cursor: pointer; }
        .premium-badge { background: linear-gradient(135deg, #f59e0b, #d97706); color: #fff; padding: 4px 10px; border-radius: 8px; font-weight: 800; font-size: 12px; display: flex; align-items: center; gap: 4px; }
        .premium-text { flex: 1; font-size: 13px; font-weight: 600; line-height: 1.3; color: #e5e5e5; }

        /* ================= CARDS (HOME & RECENT) ================= */
        .header-flex { display: flex; justify-content: space-between; align-items: center; padding: 15px; }
        .header-flex h2 { font-size: 18px; margin: 0; font-weight: 800; }
        .header-action { color: #3b82f6; font-size: 13px; font-weight: 600; display: flex; align-items: center; gap: 4px; }

        .horizontal-scroll { display: flex; gap: 12px; overflow-x: auto; padding: 0 15px; scroll-snap-type: x mandatory; }
        .scroll-card { width: 130px; flex-shrink: 0; scroll-snap-align: start; cursor: pointer; display: flex; flex-direction: column; gap: 8px; }
        .scroll-card-img { position: relative; width: 100%; padding-top: 145%; border-radius: 8px; overflow: hidden; background: #222; }
        .scroll-card-img img { position: absolute; inset: 0; width: 100%; height: 100%; object-fit: cover; }
        .card-overlay { position: absolute; inset: 0; background: linear-gradient(to top, rgba(0,0,0,0.9) 0%, transparent 50%); }
        
        .badge-top-left { position: absolute; top: 6px; left: 6px; background: #ef4444; color: #fff; font-size: 10px; font-weight: 800; padding: 3px 6px; border-radius: 4px; z-index: 2; }
        .badge-top-right { position: absolute; top: 6px; right: 6px; background: rgba(0,0,0,0.7); color: #facc15; font-size: 10px; font-weight: 800; padding: 3px 6px; border-radius: 4px; z-index: 2; display: flex; align-items: center; gap: 3px; }
        .card-views { position: absolute; bottom: 6px; left: 6px; color: #fff; font-size: 11px; font-weight: 600; z-index: 2; display: flex; align-items: center; gap: 4px; }
        
        .scroll-card-title { font-size: 13px; font-weight: 600; color: #fff; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; line-height: 1.4; }

        .anime-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 15px 10px; padding: 0 15px; }

        /* ================= DETAIL VIEW ================= */
        .detail-hero { position: relative; width: 100%; padding-top: 65%; background-size: cover; background-position: center; }
        .detail-hero-overlay { position: absolute; inset: 0; background: linear-gradient(to top, #0f0f0f 0%, rgba(15,15,15,0.8) 30%, transparent 100%); }
        .detail-hero-content { position: absolute; bottom: 0; left: 0; width: 100%; padding: 20px; box-sizing: border-box; z-index: 2; }
        .nav-back { position: absolute; top: 15px; left: 15px; z-index: 10; background: rgba(0,0,0,0.5); padding: 8px; border-radius: 50%; display: flex; cursor: pointer; }
        
        /* Filter & Sort Bar */
        .filter-bar { display: flex; justify-content: space-between; padding: 15px; background: #151515; border-bottom: 1px solid #222; align-items: center; }
        .filter-btn { background: #222; border: 1px solid #333; color: #fff; padding: 6px 12px; border-radius: 6px; font-size: 13px; font-weight: 600; display: flex; align-items: center; gap: 5px; }

        /* Episode List Detail */
        .ep-list-item { display: flex; align-items: center; padding: 15px; border-bottom: 1px solid #1a1a1a; gap: 15px; cursor: pointer; }
        .ep-list-info { flex: 1; }
        .ep-list-title { font-size: 15px; font-weight: 700; margin-bottom: 6px; }
        .ep-list-meta { font-size: 12px; color: #888; display: flex; align-items: center; gap: 8px; }
        .ep-list-btn { background: #222; color: #fff; padding: 6px 16px; border-radius: 20px; font-size: 12px; font-weight: 700; display: flex; align-items: center; gap: 4px; }
        .ep-list-btn.locked { color: #facc15; }

        /* ================= CUSTOM VIDEO PLAYER (WATCH VIEW) ================= */
        .video-wrapper { position: relative; width: 100%; padding-top: 56.25%; background: #000; }
        .video-wrapper iframe, .video-wrapper video { position: absolute; top: 0; left: 0; width: 100%; height: 100%; border: none; }
        
        /* Custom Controls Overlay */
        .custom-controls { position: absolute; inset: 0; background: rgba(0,0,0,0.4); z-index: 10; display: flex; flex-direction: column; justify-content: space-between; padding: 10px; opacity: 0; transition: opacity 0.3s; }
        .video-wrapper:hover .custom-controls { opacity: 1; }
        .cc-top { display: flex; justify-content: space-between; align-items: center; }
        .cc-center { display: flex; justify-content: center; align-items: center; gap: 30px; flex: 1; }
        .cc-btn { background: rgba(0,0,0,0.6); border: none; color: #fff; width: 45px; height: 45px; border-radius: 50%; display: flex; align-items: center; justify-content: center; cursor: pointer; backdrop-filter: blur(4px); }
        .cc-bottom { display: flex; align-items: center; gap: 10px; }
        .cc-progress-bg { flex: 1; height: 4px; background: rgba(255,255,255,0.3); border-radius: 2px; position: relative; cursor: pointer; }
        .cc-progress-fill { position: absolute; left: 0; top: 0; height: 100%; background: #ef4444; border-radius: 2px; width: 30%; }
        .cc-time { font-size: 12px; font-weight: 600; font-family: monospace; }
        .cc-setting-btn { background: transparent; border: none; color: #fff; font-weight: 700; font-size: 13px; display: flex; align-items: center; gap: 4px; }

        /* Action Buttons Below Video */
        .watch-actions { display: flex; gap: 8px; overflow-x: auto; padding: 15px; border-bottom: 1px solid #1a1a1a; }
        .w-btn { background: #222; border: none; color: #fff; padding: 8px 16px; border-radius: 20px; font-size: 13px; font-weight: 700; display: flex; align-items: center; gap: 6px; flex-shrink: 0; }
        .w-btn.active { background: rgba(59,130,246,0.15); color: #3b82f6; border: 1px solid #3b82f6; }

        /* Episode Squares Horizontal */
        .ep-squares-container { display: flex; gap: 10px; overflow-x: auto; padding: 15px; }
        .ep-sq { width: 50px; height: 50px; background: #222; border-radius: 12px; display: flex; align-items: center; justify-content: center; font-weight: 800; font-size: 15px; flex-shrink: 0; color: #888; }
        .ep-sq.active { background: #3b82f6; color: #fff; }

        /* ================= YOUTUBE STYLE COMMENTS ================= */
        .comment-section { padding: 15px; }
        .comment-tabs { display: flex; gap: 10px; margin-bottom: 20px; }
        .c-tab { background: #222; color: #fff; padding: 8px 16px; border-radius: 20px; font-size: 13px; font-weight: 700; cursor: pointer; }
        .c-tab.active { background: #fff; color: #000; }
        
        .comment-input-area { display: flex; gap: 12px; margin-bottom: 25px; align-items: center; }
        .c-avatar { width: 36px; height: 36px; border-radius: 50%; object-fit: cover; background: #333; }
        .c-input { flex: 1; background: #222; border: none; padding: 12px 15px; border-radius: 20px; color: #fff; font-size: 13px; outline: none; font-family: inherit; }
        
        .comment-item { display: flex; gap: 12px; margin-bottom: 20px; align-items: flex-start; }
        .c-main { flex: 1; }
        .c-header { display: flex; align-items: center; gap: 6px; margin-bottom: 4px; flex-wrap: wrap; }
        .c-name { font-size: 13px; font-weight: 700; color: #fff; }
        .c-time { font-size: 11px; color: #888; }
        
        .c-badge { font-size: 10px; font-weight: 800; padding: 2px 6px; border-radius: 10px; display: flex; align-items: center; gap: 3px; }
        .badge-lvl { background: rgba(250,204,21,0.15); color: #facc15; border: 1px solid rgba(250,204,21,0.3); }
        .badge-premium { background: #3b82f6; color: #fff; }
        .badge-biasa { background: #333; color: #ccc; }
        .badge-dev { background: #ef4444; color: #fff; }
        
        .c-text { font-size: 13px; color: #eee; line-height: 1.5; margin-bottom: 6px; }
        .c-reply { font-size: 12px; font-weight: 700; color: #3b82f6; cursor: pointer; }

        /* ================= PROFIL & BOTTOM NAV ================= */
        #app { padding-bottom: 70px; }
        .bottom-nav { position: fixed; bottom: 0; left: 0; width: 100%; background: rgba(15,15,15,0.95); backdrop-filter: blur(10px); display: flex; border-top: 1px solid #222; padding-bottom: env(safe-area-inset-bottom); z-index: 1000; }
        .nav-item { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 10px 0; color: #888; background: transparent; border: none; gap: 4px; }
        .nav-item.active { color: #3b82f6; }
        .nav-item span { font-size: 10px; font-weight: 700; }

        /* Profil CSS (Sesuai update sebelumnya) */
        .profile-header { text-align: center; padding: 10px 0 20px 0; }
        .profile-avatar { width: 90px; height: 90px; border-radius: 50%; border: 3px solid #1a1a1a; object-fit: cover; }
        .profile-stats { display: flex; justify-content: space-around; padding: 0 10px 20px 10px; border-bottom: 1px solid #1a1a1a; }
        .stat-box { text-align: center; }
        .stat-val { font-size: 18px; font-weight: 800; }
        .stat-lbl { font-size: 11px; color: #888; }
        .profile-tabs { display: flex; justify-content: space-around; border-bottom: 1px solid #1a1a1a; margin-bottom: 15px; }
        .ptab { padding: 12px; color: #888; font-weight: 700; font-size: 14px; position: relative; }
        .ptab.active { color: #fff; }
        .ptab.active::after { content: ''; position: absolute; bottom: -1px; left: 10%; width: 80%; height: 3px; background: #fff; border-radius: 3px 3px 0 0; }

        /* Histori item merah */
        .history-item { display: flex; gap: 15px; padding: 0 15px 15px 15px; align-items: center; }
        .hi-img { width: 60px; height: 60px; border-radius: 8px; object-fit: cover; }
        .hi-info { flex: 1; }
        .hi-progress { height: 4px; background: #333; border-radius: 2px; margin-top: 8px; overflow: hidden; }
        .hi-fill { height: 100%; background: #ef4444; width: 70%; }
    </style>
</head>
<body>

    <div id="loading" class="hidden">
        <div class="spinner"></div>
        <p>Memuat Anime...</p>
    </div>

    <div id="serverModalOverlay" onclick="closeServerModal()"></div>
    <div id="serverModal">
        <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px;">
            <div style="font-weight: 800; font-size: 18px;">Pilih Quality Server</div>
            <button onclick="closeServerModal()" style="background: none; border: none; color: #aaa;"><svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line></svg></button>
        </div>
        <div id="modal-server-list" style="display: flex; flex-direction: column; gap: 10px;"></div>
    </div>

    <nav class="navbar" id="mainNavbar">
        <div class="app-logo"><span class="blue">Anime</span><span class="white">ku</span></div>
        <div class="top-search-bar" id="searchBarWrapper">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#888" stroke-width="2"><circle cx="11" cy="11" r="8"></circle><line x1="21" y1="21" x2="16.65" y2="16.65"></line></svg>
            <input type="text" id="searchInput" placeholder="Cari Anime Di Sini" onkeypress="if(event.key === 'Enter') handleSearch(this.value)">
        </div>
    </nav>

    <main id="app">
        <div id="home-view">
            </div>

        <div id="search-view" class="hidden"></div>
        <div id="recent-view" class="hidden"></div>
        <div id="favorite-view" class="hidden"></div>

        <div id="developer-view" class="hidden">
            <div id="auth-check-container"></div>
        </div>

        <div id="detail-view" class="hidden">
            </div>

        <div id="watch-view" class="hidden">
            </div>
    </main>

    <nav class="bottom-nav" id="bottomNav">
        <button class="nav-item active" onclick="switchTab('home')" id="tab-home">
            <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"></path><polyline points="9 22 9 12 15 12 15 22"></polyline></svg><span>Home</span>
        </button>
        <button class="nav-item" onclick="switchTab('recent')" id="tab-recent">
            <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"></circle><polyline points="12 6 12 12 16 14"></polyline></svg><span>Recent</span>
        </button>
        <button class="nav-item" onclick="switchTab('favorite')" id="tab-favorite">
            <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"></path><path d="M13.73 21a2 2 0 0 1-3.46 0"></path></svg><span>Subscribe</span>
        </button>
        <button class="nav-item" onclick="switchTab('developer')" id="tab-developer">
            <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path><circle cx="12" cy="7" r="4"></circle></svg><span>Akun</span>
        </button>
    </nav>

    <script src="app.js"></script>
</body>
</html>
