<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Animeku - Riwayat Menonton</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;500;700;900&display=swap" rel="stylesheet">
    
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-database-compat.js"></script>

    <style>
        body, html { margin: 0; padding: 0; background: #050505; color: #fff; font-family: 'Outfit', sans-serif; overflow-x: hidden; }
        .hidden { display: none !important; }
        
        /* Navbar & Bottom Nav */
        .navbar { position: sticky; top: 0; z-index: 1000; background: #050505; padding: 12px 15px; display: flex; align-items: center; justify-content: space-between; }
        .bottom-nav { position: fixed; bottom: 0; left: 0; width: 100%; background: #050505; display: flex; border-top: 1px solid #111; z-index: 1000; }
        .nav-item { flex: 1; background: none; border: none; color: #555; padding: 12px 0; display: flex; flex-direction: column; align-items: center; font-size: 11px; font-weight: 700; cursor: pointer; }
        .nav-item.active { color: #3b82f6; }

        /* Loader */
        #loading { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #050505; z-index: 9999; display: flex; justify-content: center; align-items: center; }
        .spinner { width: 40px; height: 40px; border: 4px solid #1a1a1a; border-left-color: #3b82f6; border-radius: 50%; animation: spin 1s linear infinite; }
        @keyframes spin { 100% { transform: rotate(360deg); } }

        /* ================= TIMELINE UI (REVISI FULL SCREEN) ================= */
        .timeline-wrapper { 
            padding: 0; /* Menempel ke pinggir layar */
            position: relative; 
            width: 100%;
        }
        .timeline-group { position: relative; margin-bottom: 30px; }

        /* Garis Vertikal Penanda */
        .timeline-group::before {
            content: ''; position: absolute; left: 20px; top: 40px; bottom: -30px; 
            width: 2px; background: #1a1a1a; z-index: 0;
        }
        .timeline-group:last-child::before { display: none; }

        /* Badge Tanggal (Nempel Kiri) */
        .timeline-date-badge {
            background: #1c3d73; /* Biru Gelap */
            color: #fff; font-size: 13px; font-weight: 900;
            padding: 7px 20px 7px 20px; 
            border-radius: 0 25px 25px 0; /* Sisi kiri rata layar */
            display: inline-block;
            position: relative; z-index: 1; margin-bottom: 20px;
            box-shadow: 4px 0 10px rgba(0,0,0,0.3);
        }

        /* Container Card */
        .timeline-items { 
            display: flex; flex-direction: column; gap: 15px; 
            padding-left: 45px; /* Memberi ruang untuk garis */
            padding-right: 15px; 
        }

        .timeline-card {
            background: #111112; border-radius: 12px; display: flex; gap: 12px;
            padding: 12px; cursor: pointer; position: relative; z-index: 1;
            border: 1px solid #1a1a1a; width: 100%; box-sizing: border-box;
        }

        .timeline-img {
            width: 70px; height: 95px; border-radius: 8px; overflow: hidden;
            position: relative; flex-shrink: 0;
        }
        .timeline-img img { width: 100%; height: 100%; object-fit: cover; }
        .timeline-play-icon {
            position: absolute; bottom: 5px; right: 5px; background: #3b82f6;
            width: 20px; height: 20px; border-radius: 50%; display: flex;
            align-items: center; justify-content: center; color: white;
        }

        .timeline-info { flex: 1; display: flex; flex-direction: column; justify-content: space-between; min-width: 0; }
        .timeline-header { display: flex; justify-content: space-between; align-items: flex-start; }
        .timeline-title { font-size: 14px; font-weight: 800; color: #eee; line-height: 1.3; overflow: hidden; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; }
        .timeline-time { font-size: 11px; color: #666; font-weight: 700; flex-shrink: 0; }
        .timeline-ep { font-size: 12px; color: #888; margin-top: 4px; }

        .timeline-progress-container { margin-top: auto; padding-top: 8px; }
        .timeline-progress-bg { height: 3px; background: #222; border-radius: 2px; overflow: hidden; margin-bottom: 5px; }
        .timeline-progress-fill { height: 100%; background: #ef4444; }
        .timeline-progress-text { font-size: 10px; color: #555; text-align: right; font-weight: 700; }
        /* ================================================================= */

    </style>
</head>
<body>

    <div id="loading" class="hidden"><div class="spinner"></div></div>

    <main id="app" style="padding-bottom: 80px;">
        <div id="home-view">
            <div style="padding: 20px; text-align: center;"><h1>Home Page</h1><p>Konten Home di sini...</p></div>
        </div>

        <div id="recent-view" class="hidden">
            <div class="view-header-title"></div>
            <div id="recent-results-container"></div>
        </div>

        <div id="developer-view" class="hidden">
            <div id="auth-check-container"></div>
        </div>
    </main>

    <nav class="bottom-nav">
        <button class="nav-item active" onclick="switchTab('home')" id="tab-home">
            <span>Home</span>
        </button>
        <button class="nav-item" onclick="switchTab('recent')" id="tab-recent">
            <span>Recent</span>
        </button>
        <button class="nav-item" onclick="switchTab('developer')" id="tab-developer">
            <span>Akun</span>
        </button>
    </nav>

    <script src="app.js"></script>
</body>
</html>
